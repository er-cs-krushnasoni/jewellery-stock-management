<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <!-- Inter font via CDN — avoids node_modules path issues when proxied -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jewellery Stock Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Block console AFTER app loads -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const isInIframe = (() => {
            try { return window.self !== window.top; } catch (e) { return true; }
          })();

          if (isInIframe) {
            const noop = function() {};
            const displayMethods = ['log', 'info', 'warn', 'debug', 'trace', 'table', 'dir', 'dirxml'];
            displayMethods.forEach(method => {
              try { console[method] = noop; } catch (e) {}
            });
            console.error = function(...args) {
              const msg = args.join(' ');
              if (msg.includes('React DevTools') || msg.includes('[vite]')) return;
            };
          }
        }, 2000);
      });
    </script>
  </body>
</html>
